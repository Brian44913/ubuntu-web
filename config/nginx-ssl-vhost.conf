# SSL Virtual Host Template
# SSL 虚拟主机模板
# Placeholders: __DOMAIN__, __PHP_VERSION__

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __DOMAIN__;

    ssl_certificate /etc/nginx/ssl/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/__DOMAIN__/privkey.pem;

    root /data/wwwroot/__DOMAIN__;
    index index.php index.html index.htm;

    access_log /data/logs/nginx_access/__DOMAIN__.log json;
    error_log /data/logs/nginx_error/__DOMAIN__.log notice;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php__PHP_VERSION__-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block hidden files / 禁止访问隐藏文件
    location ~ /\.(ht|git|env) {
        deny all;
    }

    # Static file caching / 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
