user www;
worker_processes auto;
pid /run/nginx.pid;
error_log /data/logs/nginx_error/error.log;
worker_rlimit_nofile 8192;

events {
	use epoll;
	worker_connections 4096;
	multi_accept on;
}

http {
	types_hash_max_size 2048;
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	server_names_hash_bucket_size 128;
	client_header_buffer_size 1k;
	large_client_header_buffers 4 16k;
	client_max_body_size 100m;
	client_body_buffer_size 1m;
	sendfile on;
	tcp_nopush on;
	keepalive_timeout 65;
	server_tokens off;
	tcp_nodelay on;

	# FastCGI settings / FastCGI 设置
	fastcgi_connect_timeout 60;
	fastcgi_send_timeout 60;
	fastcgi_read_timeout 60;
	fastcgi_buffer_size 64k;
	fastcgi_buffers 4 64k;
	fastcgi_busy_buffers_size 128k;
	fastcgi_temp_file_write_size 128k;
	fastcgi_intercept_errors on;

	# Open file cache / 文件缓存（减少 stat/open 系统调用，提升静态文件性能）
	open_file_cache max=10000 inactive=30s;
	open_file_cache_valid 60s;
	open_file_cache_min_uses 2;
	open_file_cache_errors on;

	# SSL Settings / SSL 设置
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers off;
	ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
	ssl_session_cache shared:SSL:10m;
	ssl_session_timeout 1d;
	ssl_session_tickets off;

	# Security headers / 安全响应头
	add_header X-Frame-Options "SAMEORIGIN" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	# Uncomment to enable HSTS / 取消注释以启用 HSTS
	# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

	# Gzip compression / Gzip 压缩
	gzip on;
	gzip_buffers 16 8k;
	gzip_comp_level 6;
	gzip_http_version 1.1;
	gzip_min_length 256;
	gzip_proxied any;
	gzip_vary on;
	gzip_types
		text/plain text/css text/xml text/javascript text/x-component
		application/javascript application/json application/xml
		application/rss+xml application/atom+xml application/xhtml+xml
		application/manifest+json application/wasm
		application/vnd.ms-fontobject application/x-font-ttf
		font/opentype font/ttf font/otf
		image/svg+xml image/x-icon;

	# Log formats / 日志格式
	log_format main '$remote_addr - $remote_user [$time_local] "$request" '
	                '$status $body_bytes_sent "$http_referer" '
	                '"$http_user_agent" "$http_x_forwarded_for"';

	log_format json escape=json '{"@timestamp":"$time_iso8601",'
	                '"server_addr":"$server_addr",'
	                '"remote_addr":"$remote_addr",'
	                '"scheme":"$scheme",'
	                '"request_method":"$request_method",'
	                '"request_uri":"$request_uri",'
	                '"request_length":"$request_length",'
	                '"uri":"$uri",'
	                '"request_time":$request_time,'
	                '"body_bytes_sent":$body_bytes_sent,'
	                '"bytes_sent":$bytes_sent,'
	                '"status":"$status",'
	                '"upstream_time":"$upstream_response_time",'
	                '"upstream_host":"$upstream_addr",'
	                '"upstream_status":"$upstream_status",'
	                '"host":"$host",'
	                '"http_referer":"$http_referer",'
	                '"http_user_agent":"$http_user_agent"'
	                '}';

	# Default catch-all server (rejects unmatched requests, hides real domain)
	# 默认拦截服务器（拒绝未匹配的请求，防止 IP 直接访问暴露真实域名）
	server {
		listen 80 default_server;
		listen [::]:80 default_server;
		server_name _;
		return 444;
	}

	server {
		listen 443 ssl default_server;
		listen [::]:443 ssl default_server;
		server_name _;
		ssl_reject_handshake on;
	}

	# Internal server (phpdir access via localhost or specific vhost)
	# 内部管理服务器（phpdir 通过 localhost 或特定虚拟主机访问）
	server {
		listen 80;
		server_name localhost;

		root /data/wwwroot/default;
		index index.php index.html index.htm;
		access_log /data/logs/nginx_access/localhost.log json;
		error_log /data/logs/nginx_error/localhost.log notice;

		error_page 404 /404.html;
		error_page 500 502 503 504 /50x.html;
		location = /50x.html {
			root /usr/share/nginx/html;
		}

		location / {
			try_files $uri $uri/ =404;
		}

		# PHP handler for phpdir / phpdir PHP 处理
		location ~ ^/phpdir-__PHPDIR_CODE__/ {
			location ~ \.php$ {
				fastcgi_pass unix:/run/php/php__PHP_VERSION__-fpm.sock;
				fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
				include fastcgi_params;
			}
		}

		location ~ /\.(ht|git|env) {
			deny all;
		}
	}

	# Virtual Host configs / 虚拟主机
	include /etc/nginx/vhost/*.conf;
}
